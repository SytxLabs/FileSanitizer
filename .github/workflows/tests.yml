name: Execute tests

on: [push]

jobs:
  code-style:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php:
          - 8.1
          - 8.2
          - 8.3
          - 8.4
          - 8.5
        dependency-version:
          - prefer-lowest
          - prefer-stable

    name: Tests P${{ matrix.php }} - ${{ matrix.dependency-version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Install
        run: composer update --${{ matrix.dependency-version }} --prefer-dist --no-interaction

      - name: Code style checks for PHP
        run: composer test
